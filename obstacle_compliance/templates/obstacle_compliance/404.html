{% extends 'obstacle_compliance/base.html' %}

{% block title %}Page Not Found - KCAA Obstacle Compliance{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-template py-5">
                <h1 class="display-1 text-muted">404</h1>
                <h2 class="mb-4">Page Not Found</h2>
                <p class="lead text-muted mb-4">
                    <i class="fas fa-map-signs me-2"></i>
                    The page you're looking for doesn't exist or has been moved.
                </p>
                <div class="error-actions">
                    <a href="{% url 'obstacle_compliance:dashboard' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-home me-2"></i>Back to Dashboard
                    </a>
                    <a href="{% url 'obstacle_compliance:map_view' %}" class="btn btn-outline-secondary btn-lg">
                        <i class="fas fa-map me-2"></i>Open Map
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
