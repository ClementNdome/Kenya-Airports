{% extends 'obstacle_compliance/base.html' %}

{% block title %}Server Error - KCAA Obstacle Compliance{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-template py-5">
                <h1 class="display-1 text-muted">500</h1>
                <h2 class="mb-4">Internal Server Error</h2>
                <p class="lead text-muted mb-4">
                    <i class="fas fa-exclamation-triangle me-2 text-warning"></i>
                    Something went wrong on our end. Please try again later.
                </p>
                <div class="error-actions">
                    <a href="{% url 'obstacle_compliance:dashboard' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-home me-2"></i>Back to Dashboard
                    </a>
                    <button class="btn btn-outline-secondary btn-lg" onclick="location.reload()">
                        <i class="fas fa-sync-alt me-2"></i>Try Again
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
